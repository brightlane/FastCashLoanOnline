name: Vulture-FastCash
on:
  push: [main]
  schedule:
    - cron: '0 * * * *'  # Hourly = 20K pages/day
  workflow_dispatch:
env:
  PAGE_LIMIT: 833
  MAXLEND_URL: "https://www.linkconnector.com/ta.php?lc=007949096598005765&atid=MaxlendWeb"
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: node generate-fastcash.js
      - run: node quality-check.js
      - run: node generate-sitemap.js
      - run: |
          git config user.name "VultureFastCash[bot]"
          git config user.email "fastcash@palmo.kid"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Vulture: 833 MaxLend fast cash pages"
            git push
          fi
